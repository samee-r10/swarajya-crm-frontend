{% extends "base.html" %}
{% block title %}Edit User | Setup{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Setup</p>
        <h1>Edit User</h1>
    </div>
    <a class="button secondary" href="{{ url_for('setup_users') }}">Back to Users</a>
</section>

<form class="form-grid" method="post">
    <label>Full Name
        <input required name="full_name" value="{{ user.full_name }}">
    </label>
    <label>Email
        <input required type="email" name="email" value="{{ user.email }}">
    </label>
    <label>Password
        <input type="password" name="password" minlength="6" placeholder="Leave blank to keep current password">
    </label>
    <label>Role
        <select name="role_id">
            <option value="">No role</option>
            {% for role in roles %}
                <option value="{{ role.id }}" {% if user.role_id == role.id %}selected{% endif %}>{{ role.name }}</option>
            {% endfor %}
        </select>
    </label>
    <label class="checkbox-label span-2">
        <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}>
        Active
    </label>
    <div class="form-actions span-2">
        <a class="button secondary" href="{{ url_for('setup_users') }}">Cancel</a>
        <button class="button" type="submit">Save User</button>
    </div>
</form>
{% endblock %}
