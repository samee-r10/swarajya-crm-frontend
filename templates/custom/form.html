{% extends "base.html" %}
{% block title %}New {{ custom_object.label }} | Lead Management CRM{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Custom Object</p>
        <h1>New {{ custom_object.label }}</h1>
    </div>
</section>

<form class="form-grid" method="post">
    <label class="span-2">Record Name
        <input required name="name" value="{{ values.get('name', '') }}">
    </label>
    {% for field in fields %}
        <label class="{% if field.field_type == 'Long Text' %}span-2{% endif %}">{{ field.label }}{% if field.is_required %} *{% endif %}
            {% if field.field_type == 'Long Text' %}
                <textarea name="{{ field.api_name }}" rows="5" {% if field.is_required %}required{% endif %}>{{ values.get(field.api_name, '') }}</textarea>
            {% elif field.field_type == 'Number' %}
                <input type="number" step="0.01" name="{{ field.api_name }}" value="{{ values.get(field.api_name, '') }}" {% if field.is_required %}required{% endif %}>
            {% elif field.field_type == 'Date' %}
                <input type="date" name="{{ field.api_name }}" value="{{ values.get(field.api_name, '') }}" {% if field.is_required %}required{% endif %}>
            {% elif field.field_type == 'Checkbox' %}
                <span class="checkbox-label"><input type="checkbox" name="{{ field.api_name }}" {% if values.get(field.api_name) %}checked{% endif %}> Checked</span>
            {% elif field.field_type == 'Dropdown' %}
                <select name="{{ field.api_name }}" {% if field.is_required %}required{% endif %}>
                    <option value="">-- Select --</option>
                    {% for option in field.picklist_options.split('\n') %}
                        {% set opt = option.strip() %}
                        {% if opt %}
                            <option value="{{ opt }}" {% if values.get(field.api_name) == opt %}selected{% endif %}>{{ opt }}</option>
                        {% endif %}
                    {% endfor %}
                </select>
            {% else %}
                <input name="{{ field.api_name }}" value="{{ values.get(field.api_name, '') }}" {% if field.is_required %}required{% endif %}>
            {% endif %}
        </label>
    {% endfor %}
    <div class="form-actions span-2">
        <a class="button secondary" href="{{ url_for('custom_object_records', api_name=custom_object.api_name) }}">Cancel</a>
        <button class="button" type="submit">Save Record</button>
    </div>
</form>
{% endblock %}
